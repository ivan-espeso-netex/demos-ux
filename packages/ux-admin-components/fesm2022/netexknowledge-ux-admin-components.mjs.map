@if (!hasSegments) {
	<mat-progress-bar 
		class="admin-progress-bar {{mode}}"
		[mode]="progressMode"
		[value]="value"
		[color]="color"
		(animationEnd)="onAnimationEnd($event)"
	></mat-progress-bar>
} @else {
	<div class="admin-progress-bar-container {{mode}}">
		@for (segment of segments; track $index) {
			<mat-progress-bar 
				class="admin-progress-bar-segment {{mode}} mat-{{segment.color}}"
				[style.z-index]="segments.length - $index"
				[mode]="progressMode"
				[value]="calculateSegmentValue($index)"
				[color]="segment.color"
				(animationEnd)="onAnimationEnd($event)"
			></mat-progress-bar>
		}
	</div>
}
