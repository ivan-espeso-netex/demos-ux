<div class="admin-expert-preview-header {{mode}}"
	[id]="id">
	<div class="admin-expert-preview-header--img">
		@if (!image) {
			<admin-image 
				[imgEntityType]="ImgEntityType.PLACEHOLDER_PHOTO_BROWSER_IMAGE_112"
				[mode]="mode === EExpertPreviewHeaderMode.DARK ? EImgMode.DARK : EImgMode.LIGHT">
			</admin-image>
		}
		@if (image && !imgError) {
			<img mat-card-sm-image src="{{image}}" alt="{{alt}}" (error)="handleImageError()">
		}
		@if (imgError) { 
			<div class="admin-expert-preview-header__img-error">
				<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
			</div>
		}
	</div>
	<div class="admin-expert-preview-header--texts">
		<p class="admin-expert-preview-header--texts_title">{{title}}</p>
		<p class="admin-expert-preview-header--texts_subtitle">{{subtitle}}</p>
	</div>
</div>
