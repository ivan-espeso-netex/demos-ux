<div class="header">
  <h4>{{ title() }}</h4>
  <admin-button
    [buttonType]="buttonButtonTypeDefault"
    id="close-dialog"
    text="close"
    tooltip="close"
    [type]="buttonTypeDefault"
    (buttonClicked)="onClose.emit(false)"
    [leftIcon]="EIconName.CLOSE"
  />
</div>
<div class="content">
  @if(innerComponent && innerComponent.selector) {
    <ng-container>
      <ng-container *ngComponentOutlet="innerComponent.selector;inputs: innerComponent.inputs"></ng-container>
    </ng-container>
  }
    <p>{{ message() }}</p>
</div>
<div class="footer">
  @if (cancelButtonText()) {
    <admin-button
      [text]="cancelButtonText()"
      [buttonType]="buttonCancelButtonTypeDefault"
      id="cancel-button"
      [type]="buttonCancelTypeDefault"
      (buttonClicked)="onClose.emit(false)"
    />
  }
  <admin-button
    [text]="confirmButtonText()"
    [buttonType]="buttonConfirmButtonTypeDefault"
    id="confirm-button"
    [type]="buttonConfirmTypeDefault"
    [color]="buttonConfirmColorDefault"
    (buttonClicked)="onClose.emit(true)"
  />
</div>
