<mat-chip-set class="{{mode}}">
    @for (chip of chips; track chip) {
      <mat-chip
				class="{{chip.theme === EChipGroupTheme.ACCENT ? 'accent' : chip.theme === EChipGroupTheme.LIGHT ? 'light' : 'gray'}}"
        [class.selectable]="selectable"
        [class.chip-selected]="selectable && !!chip.selected"
        (click)="clickedChip.emit(chip)"
        (removed)="removedChip.emit(chip)">
        @if(chip.img) {
          <img matChipAvatar src="{{chip.img}}"/>
        }
        @if(chip.type && chip.iconName) {
          <div matChipAvatar class="chip-placeholder"
            [ngClass]="'image-background-' + chip.type">
            <admin-icon 
              [icon]="chip.iconName"
              [color]="chip.iconColor ?? EIconColor.PRIMARY">
            </admin-icon>
          </div>
        }
        @if(!chip.type && chip.iconName) {
          <admin-icon 
            [icon]="chip.iconName"
            [color]="chip.iconColor ?? EIconColor.PRIMARY">
          </admin-icon>
        }
        <div 
					class="chip-text" 
					[ngClass]="{'chip-text--multiline': chip.multiline}">
        @if(chip.subtext) {
					<span class="subtext" [matTooltip]="chip.subtext || '' ">{{chip.subtext}}</span>
        }
        @if(chip.text) {
					<span class="text" [matTooltip]="chip.text">{{chip.text}}</span>
        }
        </div>
        @if(chip.removable){
					<button matChipRemove>
						<admin-icon [icon]="EIconName.CLOSE"></admin-icon>
					</button>
        }
      </mat-chip>
    }
</mat-chip-set>
