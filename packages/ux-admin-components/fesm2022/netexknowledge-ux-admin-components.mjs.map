<div class="admin-no-content-placeholders {{mode}}">
	<div class="admin-no-content-placeholders--img">
		<admin-image 
			[imgEntityType]="imgEntity"
			[mode]="mode === ENoContentPlaceholdersMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
		</admin-image>
	</div>
	<div class="admin-no-content-placeholders--texts">
		<h4>{{title}}</h4>
		<p>{{description}}</p>
		@if (hasButton) {
			<admin-button 
				[buttonType]="buttonButtonTypeDefault"
				[color]="buttonColorDefault" 
				[type]="buttonTypeDefault"
				text="{{buttonText}}"
				[leftIcon]="buttonIcon"
				(click)="buttonClicked.emit($event)"
				tooltip="{{buttonText}}"
				[mode]="mode === ENoContentPlaceholdersMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
			></admin-button>
		}
		@if (menuButtonConfig) {
			<admin-menu
				[buttonType]="menuButtonConfig.buttonType"
				[id]="menuButtonConfig.id"
				[type]="menuButtonConfig.type"
				[color]="menuButtonConfig.color"
				[text]="menuButtonConfig.text"
				[leftIcon]="menuButtonConfig.leftIcon"
				[rightIcon]="menuButtonConfig.rightIcon"
				[disabled]="menuButtonConfig.disabled"
				[options]="menuButtonConfig.options"
				(click)="menuButtonClicked.emit($event)"
				(optionClicked)="optionMenuButtonClicked.emit($event)"
				[mode]="mode === ENoContentPlaceholdersMode.DARK ? EAdminMenuMode.DARK : EAdminMenuMode.LIGHT"
			></admin-menu>
		}  
		@if (splitButtonConfig) { 
			<admin-split-button
				[color]="splitButtonConfig.color"
				[label]="splitButtonConfig.label"
				[options]="splitButtonConfig.options"
				[status]="splitButtonConfig.status"
				[mode]="splitButtonConfig.mode"
				[waitingStateLabel]="splitButtonConfig.waitingStateLabel"
				(onBtnClick)="splitButtonClicked.emit($event)"
				(onDropdownClick)="splitButtonDropdownClicked.emit($event)"
			></admin-split-button>
		}
	</div>
</div>
