<div class="admin-aux-sidenav {{mode}}"
    [id]="id">
    <div class="admin-aux-sidenav-header">
        <h3>{{title}}</h3>
        @if (icon) {
            <admin-button
              id="{{idIconButton}}"
              [type]="EButtonType.BUTTON"
              tooltip="{{tooltipIconButton}}"
              [buttonType]="EButtonButtonType.MATICONBUTTON"
              [color]="EButtonColor.PRIMARY"
              [leftIcon]="icon"
              [mode]="mode === EAuxSidenavMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
              (buttonClicked)="iconButtonClicked.emit()"
              (click)="$event.stopPropagation()" 
            ></admin-button>
        }
    </div>
    <admin-divider
        [mode]="mode === EAuxSidenavMode.DARK ? EDividerMode.DARK : EDividerMode.LIGHT"
    ></admin-divider>
    <div class="admin-aux-sidenav-upper">
        <ng-content select="[upper]"></ng-content>
    </div>
    <admin-divider
        [mode]="mode === EAuxSidenavMode.DARK ? EDividerMode.DARK : EDividerMode.LIGHT"
    ></admin-divider>
    <div class="admin-aux-sidenav-med">
        <ng-content select="[med]"></ng-content>
    </div>
    <admin-divider
        [mode]="mode === EAuxSidenavMode.DARK ? EDividerMode.DARK : EDividerMode.LIGHT"
    ></admin-divider>
    <div class="admin-aux-sidenav-lower">
        <ng-content select="[lower]"></ng-content>
    </div>
</div>
