<div class="admin-grid-actions-toolbar {{mode}}">
  <div class="admin-grid-actions-toolbar__left">
		<admin-button 
			[buttonType]="EButtonButtonType.MATFLATBUTTON" 
			[color]="EButtonColor.ACCENT" 
			[type]="EButtonType.BUTTON" 
			[leftIcon]="EIconName.CLOSE" 
			[tooltip]="closeButtonTooltip"
			(click)="closeClickedButton.emit()"
			[mode]="mode === EGridActionsToolbarMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
		</admin-button>
		<h4>{{title}}</h4>
  </div>
  <div class="admin-grid-actions-toolbar__right">
    <ng-content select="[actions]"></ng-content>
  </div>
</div>
