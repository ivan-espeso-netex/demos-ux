<button mat-button 
    class="admin-floating-button"
    [id]="id"
    [disabled]="disabled"
    (click)="handleClick()"
    type="button"
    matTooltip="{{tooltip}}">
    <div class="admin-floating-button__image">
        @if (!image) {
          <admin-image [imgEntityType]="ImgEntityType.PLACEHOLDER_AI_PROFILE_PHOTO_64"></admin-image>
        }
        @if (image && !imgError) {
          <img src="{{image}}" alt="{{imageAlt}}" (error)="handleImageError()">
        }
        @if (imgError) {
          <div class="admin-floating-button__image-error">
						<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
					</div>
        }
    </div>
</button>
