<div class="admin-sidenav-menu">

	@if(expanded){
		<!--Button with Expansible panel-->
		<div class="admin-sidenav-menu--expansion-panel {{mode}}">
			<admin-expansion-panel
				[title]="text"
				[tooltip]="tooltip"
				[icon]="icon"
        [expanded]="opened()"
				[mode]="mode === ESidenavMenuButtonMode.DARK ? IAdminExpansionPanelMode.DARK : IAdminExpansionPanelMode.LIGHT">
				<ng-container *ngTemplateOutlet="sidenavMenuContent"></ng-container>
			</admin-expansion-panel>
		</div>
	}
	@else{
		<!--Button with Dropdown menu-->
		<div class="admin-sidenav-menu--dropdown-menu">
			<admin-sidenav-button
				type="submit"
				tooltip="{{tooltip}}"
				[icon]="icon"
				[matMenuTriggerFor]="menu"
				[mode]="mode === ESidenavMenuButtonMode.DARK ? ESidenavButtonMode.DARK : ESidenavButtonMode.LIGHT">
			</admin-sidenav-button>
			<mat-menu #menu="matMenu" [id]="id" class="admin-sidenav-menu-panel {{mode}}">
				<ng-container *ngTemplateOutlet="sidenavMenuContent"></ng-container>
			</mat-menu>
		</div>
	}
</div>

<ng-template #sidenavMenuContent>
	<div class="admin-sidenav-menu_buttons">
		<ng-content></ng-content>
	</div>
</ng-template>
