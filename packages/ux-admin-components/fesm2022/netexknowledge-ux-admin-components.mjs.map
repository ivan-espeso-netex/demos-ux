<div class="admin-info-main-heading {{mode}}">
	<label>{{title}}</label>
	<admin-button
		[buttonType]="buttonButtonType"
		[color]="buttonColor"
		[type]="buttonType"
		[leftIcon]="buttonIcon"
		(buttonClicked)="onButtonClicked()"
		[mode]="mode === IAdminInfoMainHeadingMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
	></admin-button>
</div>
