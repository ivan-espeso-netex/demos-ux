<div class="admin-disclaimer {{color}} {{mode}}"
	[attr.id]="id ? id : null">
	@if (icon) {
		<admin-icon [icon]="icon"></admin-icon>
	}
	<span>{{text}}</span>
	@if (hasProgressSpinner) {
		<admin-progress-spinner
			[progressMode]="modeProgressSpinner"
			[color]="getProgressSpinnerColor()"
			[diameter]="diameter"
			[strokeWidth]="strokeWidth"
		></admin-progress-spinner>
	}
</div>
