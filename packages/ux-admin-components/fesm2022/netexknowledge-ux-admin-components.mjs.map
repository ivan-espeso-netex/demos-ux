<button mat-stroked-button
	class="admin-conversational-starter-button {{mode}}"
	[id]="id" 
	[type]="type"
	[disabled]="disabled"
	(click)="handleClick()">
	<div class="admin-conversational-starter-button__wrapper">
		@if (image) {
			<div class="admin-conversational-starter-button__wrapper--image">
				@if (image && !imgError) {
					<img src="{{image}}" alt="{{imageAlt}}" (error)="handleImageError()">
				}
				@if (imgError) {
					<div class="admin-conversational-starter-button__wrapper--image-error">
						<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
					</div>
				}
			</div>
		}
		<div class="admin-conversational-starter-button__wrapper--texts">
			@if (title) {
				<h4>{{title}}</h4>
			}
			<p matTooltip="{{textTooltip}}">{{text}}</p>
		</div>
	</div>
</button>
