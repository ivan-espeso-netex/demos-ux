<mat-accordion class="admin-expansion-panel {{mode}}">
	<mat-expansion-panel
		[expanded]="expanded"
		[disabled]="disabled">
		<mat-expansion-panel-header>
			<mat-panel-title class="buttonLabel">
				@if (icon) {
					<div class="admin-expansion-panel__title--icon">
						<admin-icon
							[icon]="icon"
						></admin-icon>
					</div>
				}
				<span matTooltip="{{tooltip}}">{{title}}</span>
			</mat-panel-title>
		</mat-expansion-panel-header>
		<ng-content></ng-content>
	</mat-expansion-panel>
</mat-accordion>
