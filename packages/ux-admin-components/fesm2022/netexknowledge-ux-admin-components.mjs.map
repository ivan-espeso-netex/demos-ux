@if (!skeleton) {
    <div class="admin-info-list {{mode}}"
        [id]="id"
        [ngClass]="{'border': hasBorder}">
        <label class="admin-info-list_left">{{title}}</label>
        <div class="admin-info-list_right">
            <ng-content></ng-content>
        </div>
    </div>
} @else if (skeleton) {
    @for (item of [].constructor(skeletonItems); track item) {
        <div class="admin-info-list skeleton {{mode}}"
            [ngClass]="{'border': hasBorder}">
            <label class="admin-info-list_left">
                <span></span>
						</label>
            <div class="admin-info-list_right">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    }
}
