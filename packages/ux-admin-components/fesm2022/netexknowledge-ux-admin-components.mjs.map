@if (!skeleton) {
	<div [id]="id" class="admin-info-block {{mode}}">
			<div class="admin-info-block--header">
					<h4>{{title}}</h4>
					@if (buttonIcon) {
						<admin-button
							[buttonType]="buttonButtonType"
							[color]="buttonColor"
							[type]="buttonType"
							[leftIcon]="buttonIcon"
							(buttonClicked)="onButtonClicked()"
							[mode]="mode === IAdminInfoBlockMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
						</admin-button>
					}
			</div>
			<div class="admin-info-block--content">
				<ng-content></ng-content>
			</div>
	</div>
} @else if (skeleton) {
	@for (item of [].constructor(skeletonItems); track item) {
		<div [id]="id" class="admin-info-block skeleton {{mode}}">
			<div class="admin-info-block--header">
				<span></span>
			</div>
			<div class="admin-info-block--content">
				<span></span>
				<span></span>
				<span></span>
			</div>
		</div>
	}
}
