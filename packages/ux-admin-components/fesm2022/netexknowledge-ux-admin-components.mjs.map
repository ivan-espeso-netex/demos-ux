<mat-tree class="admin-tree {{mode}}" [dataSource]="dataSource" [treeControl]="treeControl">
  <mat-tree-node *matTreeNodeDef="let node; when: hasNoChild" matTreeNodePadding>
		<button class="admin-tree__node has-no-child" [class.selected]="isSelected(node)" mat-button aria-hidden="true" (click)="onNodeClick(node, $event)">
			<div class="admin-tree__node-content">
				@if (node.icon || globalIcon) {
					<admin-icon class="admin-tree__node-content__icon" [icon]="node.icon || globalIcon!" [mode]="mode === EAdminTreeMode.DARK ? EIconMode.DARK : EIconMode.LIGHT"></admin-icon>
				}
				<span class="admin-tree__node-content__label">{{node.label}}</span>
			</div>
    </button>
  </mat-tree-node>

  <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding>
    <button class="admin-tree__node" [class.selected]="isSelected(node)" mat-button matTreeNodeToggle [attr.aria-label]="'toggle ' + node.label" (click)="onNodeClick(node, $event)">
			<admin-icon
				[icon]="treeControl.isExpanded(node) ? EIconName.EXPAND_LESS : EIconName.EXPAND_MORE"
				[mode]="mode === EAdminTreeMode.DARK ? EIconMode.DARK : EIconMode.LIGHT">
			</admin-icon>
			<div class="admin-tree__node-content">
				@if (node.icon || globalIcon) {
					<admin-icon class="admin-tree__node-content__icon" [icon]="node.icon || globalIcon!" [mode]="mode === EAdminTreeMode.DARK ? EIconMode.DARK : EIconMode.LIGHT"></admin-icon>
				}
				<span class="admin-tree__node-content__label">{{node.label}}</span>
			</div>
			<div class="admin-tree__node__options">
				@if (node.options && node.options.length > 0) {
					<admin-menu
						[buttonType]="buttontype"
						[color]="color"
						[leftIcon]="EIconName.MORE_VERT"
						[options]="node.options"
						(optionClicked)="optionClicked.emit($event)"
						(click)="$event.stopPropagation()"
						[mode]="mode === EAdminTreeMode.DARK ? EAdminMenuMode.DARK : EAdminMenuMode.LIGHT"
					></admin-menu>
				}
			</div>
    </button>
  </mat-tree-node>
</mat-tree>
