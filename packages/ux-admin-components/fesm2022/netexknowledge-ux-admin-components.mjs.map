<mat-radio-group 
	[class]="'admin-radio-group admin-radio-group-position-' + position + ' ' + mode"
	[disabled]="disabled"
	[name]="name"
	[value]="radioGroupValue"
	[labelPosition]="labelPosition" 
	(change)="onRadioChange($event)">
	@for (option of options; track option) {
		<mat-radio-button
			[value]="option.value"
			[disabled]="option.disabled">
			{{ option.label }}
		</mat-radio-button>
	}
</mat-radio-group>
