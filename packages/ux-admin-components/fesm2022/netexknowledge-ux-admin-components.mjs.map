@if (!readonly) {
	<mat-form-field class="admin-color-picker {{mode}}">
		<mat-label class="mat-body">{{ label }}</mat-label>
		<input 
			matInput 
			[formControl]="inputCtrl" 
			[placeholder]="placeholder"/>
		<ngx-colors matSuffix
			ngx-colors-trigger 
			[(ngModel)]="color"
			[hideColorPicker]="hideColorPicker"
			[hideTextInput]="hideTextInput"
			[acceptLabel]="acceptLabel"
			[cancelLabel]="cancelLabel"
			[palette]="$any(palette)"
			[colorsAnimation]="'popup'"
			[overlayClassName]="'admin-color-picker-overlay'"
			[formControl]="pickerCtrl"
			(change)="onColorPickerPanelChange($event)"
			(input)="onColorPickerPanelInput($event)"
			(slider)="onColorPickerPanelSlider($event)"
			(open)="onColorPickerPanelOpen()"
			(close)="onColorPickerPanelClose()">
	</ngx-colors>
		<mat-error class="mat-caption">
			@for (error of errorMessages | keyvalue; track error) {
				@if (inputCtrl.errors?.[error.key]) { 
					<span>{{ error.value }}</span><br/>
				}
			}
		</mat-error>
	</mat-form-field>
} @else {
	<div class="admin-color-picker-readonly">
		<div class="preview">
			<div class="preview-background">
				<div 
					class="circle"
					[class.colornull]="!displayColor"
					[style.background-color]="displayColor ?? ''">
				</div>
			</div>
		</div>
		<div class="admin-color-picker-readonly__text">{{ displayColor }}</div>
	</div>
}
