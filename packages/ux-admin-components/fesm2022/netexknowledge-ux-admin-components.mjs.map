@if (!skeleton) {
<mat-card class="admin-kpi-card {{mode}}"
					[id]="id">
	<mat-card-header>
		<mat-card-title-group>
			<div class="admin-kpi-card--img"
					 [ngClass]="'image-background-' + color">
				@if (!image && !icon) {
				<admin-image 
					[imgEntityType]="ImgEntityType.PLACEHOLDER_ACTION_NO_IMAGE"
					[mode]="mode === EKpiCardMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
				</admin-image>
				}
				@if (image && !imgError) {
				<img mat-card-sm-image
						 src="{{image}}"
						 alt="{{alt}}"
						 (error)="handleImageError()">
				}
				@if (imgError) {
				<div class="admin-kpi-card__img-error">
					<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
				</div>
				}
				@if (icon) {
					<admin-icon 
						[color]="iconColor"
						[icon]="icon">
					</admin-icon>
				}
			</div>
			<mat-card-title>{{title}}</mat-card-title>
			<mat-card-subtitle>{{subtitle}}</mat-card-subtitle>
		</mat-card-title-group>
	</mat-card-header>
</mat-card>
} @else if (skeleton) {
@for (item of [].constructor(skeletonItems); track item) {
<mat-card class="admin-kpi-card skeleton {{mode}}">
	<mat-card-header>
		<mat-card-title-group>
			<div class="admin-kpi-card--img"></div>
			<mat-card-title>
				<span></span>
			</mat-card-title>
			<mat-card-subtitle>
				<span></span>
			</mat-card-subtitle>
		</mat-card-title-group>
	</mat-card-header>
</mat-card>
}
}
