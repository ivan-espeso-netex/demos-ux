<mat-slide-toggle
    class="admin-slide-toggle {{mode}}"
    [id]="id"
    [attr.name]="name"
    [aria-label]="arialabel"
    [disabled]="disabled"
    [checked]="checked"
    [required]="isRequired"
    [hideIcon]="true"
    (click)="slideToggleClicked.emit()"
    (change)="change.emit($event)">
    <span class="label">{{label}}</span>
</mat-slide-toggle>
