<div class="admin-progress-bar-with-button {{mode}}">
	@if (title) {
	<div class="admin-progress-bar-with-button--title">
		@if (icon) {
			<admin-icon 
				[icon]="icon"
				[color]="EIconColor.PRIMARY"
				[mode]="mode === EProgressBarWithButtonMode.DARK ? EIconMode.DARK : EIconMode.LIGHT">
			</admin-icon>
		}
		<p class="label">{{title}}</p>
	</div>
	}
	@if (progressBarText) {
	<div class="admin-progress-bar-with-button--progress">
		<admin-progress-bar 
			[value]="progressBarValue"
			[color]="progressBarColor"
			[mode]="mode === EProgressBarWithButtonMode.DARK ? EProgressBarMode.DARK : EProgressBarMode.LIGHT">
		</admin-progress-bar>
		<p>{{progressBarText}}</p>
	</div>
	}
	@if (buttonText) {
	<admin-button 
		[buttonType]="buttonButtonTypeDefault"
		[color]="buttonColorDefault"
		text="{{buttonText}}"
		[type]="buttonTypeDefault"
		tooltip="{{buttonText}}"
		(click)="handleClick()"
		(buttonClicked)="sidenavFooterButtonClicked.emit()"
		[mode]="mode === EProgressBarWithButtonMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
	</admin-button>
	}
</div>
