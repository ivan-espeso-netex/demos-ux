@if (!skeleton) {
	<mat-card
		class="admin-adaptive-resource-card {{mode}}"
		[id]="id"
		[ngClass]="{'selected': selected}"
		(click)="handleClick($event)">
		<div class="admin-adaptive-resource-card--img"
			[ngClass]="'image-background-' + type">
			@if (image) {
				<img mat-card-image src="{{image}}" alt="">
			} 
			@else {
				<admin-icon [icon]="cardIcon"></admin-icon>
			}
		</div>
		<mat-card-header>
			<mat-card-title>
				<span>{{text}}</span>
			</mat-card-title>
			<mat-card-subtitle>{{subtext}}</mat-card-subtitle>
			<admin-menu
				[buttonType]="buttontype"
				[color]="color"
				[leftIcon]="EIconName.MORE_VERT"
				[options]="options"
				(optionClicked)="optionClicked.emit($event)"
				[mode]="mode === EAdaptativeResourceCardMode.DARK ? EAdminMenuMode.DARK : EAdminMenuMode.LIGHT"
			></admin-menu>
		</mat-card-header>
	</mat-card>
} @else if (skeleton) {
	@for (item of [].constructor(skeletonItems); track item) {
		<mat-card class="admin-adaptive-resource-card skeleton {{mode}}">
			<div class="admin-adaptive-resource-card--img"></div>
			<mat-card-header>
				<mat-card-title>
					<span></span>
				</mat-card-title>
				<mat-card-subtitle>
					<span></span>
				</mat-card-subtitle>
			</mat-card-header>
		</mat-card> 
	}
}
