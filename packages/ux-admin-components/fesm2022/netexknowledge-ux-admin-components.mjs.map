<div class="admin-secondary-content-heading {{mode}}">
	@if (icon) {
		<admin-icon 
			[icon]="icon"
			[mode]="mode === ESecondaryContentHeadingMode.DARK ? EIconMode.DARK : EIconMode.LIGHT"
		></admin-icon>
	}
	<h3>{{title}}</h3>
	@if (label) {
		<admin-label 
			[text]="label"
			[mode]="mode === ESecondaryContentHeadingMode.DARK ? ELabelMode.DARK : ELabelMode.LIGHT"
			[color]="labelColor">
		</admin-label>
	}
	@if (options.length > 0) {
		<admin-menu
			[buttonType]="buttontype"
			[color]="color" 
			[leftIcon]="EIconName.MORE_VERT"
			[options]="options"
			(optionClicked)="optionClicked.emit($event)"
			(click)="$event.stopPropagation()"
			[mode]="mode === ESecondaryContentHeadingMode.DARK ? EMenuMode.DARK : EMenuMode.LIGHT"
		></admin-menu>
	}
	<admin-progress-bar 
		class="admin-secondary-content-heading__progress-bar" 
	  [style.visibility]="isLoading ? 'visible' : 'hidden'" 
	  [progressMode]="EProgressMode.INDETERMINATE"
	  [color]="EProgressBarColor.ACCENT"
></admin-progress-bar>
</div>
