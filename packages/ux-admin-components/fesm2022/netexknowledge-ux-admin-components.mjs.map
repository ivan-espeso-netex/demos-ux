<button
  mat-flat-button
  (click)="onBtnClick.emit($event);"
  [color]="color"
  [disabled]="status === 'awaiting' || status === 'disabled'"
	class="{{mode}}">
	@if (leftIcon) {
		<admin-icon 
			[icon]="leftIcon">
		</admin-icon>
	}
  <span class="buttonLabel">{{ status === 'awaiting' ? waitingStateLabel : label }}</span>
</button>
@if (options && options.length > 0) {
	<button 
		mat-flat-button 
		[color]="color"
		[disabled]="status === 'awaiting' || status === 'disabled'"
		[matMenuTriggerFor]="menu"
		class="{{mode}}">
			<div class="separator"></div>
			@if(status === 'awaiting'){
				<mat-icon><div class="loader"></div></mat-icon>
			}@else {
				<admin-icon [icon]="EIconName.EXPAND_MORE"></admin-icon>
			}
	</button>
	<mat-menu #menu="matMenu" xPosition="before" class="admin-split-button-menu-panel {{mode}}">
		@for (option of options; track option.id) {
			@if (option.divider) {
				<hr />
			}
			<button
				(click)="handleClick(option)"
				[disabled]="option.disabled"
				[id]="option.id"
				mat-menu-item>
				<p class="admin-split-button-menu-panel__btn--text">
					<span>{{ option.text }}</span>
					@if (option.icon) {
						<admin-icon 
							[icon]="option.icon || 'default-icon-name'">
						</admin-icon>
					}
				</p>

			</button>
		}
	</mat-menu>
}
