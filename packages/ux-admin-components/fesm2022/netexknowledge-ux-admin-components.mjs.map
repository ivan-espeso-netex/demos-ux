<div class="admin-comment {{mode}}"
	id="{{id}}">
	<div class="admin-comment__check">
		@if (hasCheckbox) {
			<admin-checkbox
				id="{{idCheckbox}}"
				[mode]="mode === EAdminCommentMode.DARK ? ECheckboxMode.DARK : ECheckboxMode.LIGHT"
				(checkboxChange)="commentCheckboxClicked.emit()"
			></admin-checkbox> 
		}
		<div class="admin-comment__img">
			@if (!image) {
				<admin-image
					[imgEntityType]="ImgEntityType.PLACEHOLDER_PROFILE_IMAGE_40"
					[mode]="mode === EAdminCommentMode.DARK ? EImgMode.DARK : EImgMode.LIGHT"
				></admin-image>
			}
			@if (image && !imgError) {
				<img src="{{image}}" alt="{{altImage}}" (error)="handleImageError()">
			}
			@if (imgError) { 
				<div class="admin-comment__img-error">
					<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
				</div>
			}
		</div>
	</div>
	<div class="admin-comment__content">
		<div class="admin-comment__texts">
			<div class="admin-comment__texts--title">
				@if (!nameLink) {
					<h4>{{title}}</h4>
				}
				@if (nameLink) {
					<admin-text-button
						[id]="textButtonId"
						[text]="title"
						[type]="textButtonType"
						[tooltip]="title"
						[disabled]="false"
						(buttonClicked)="buttonClicked.emit()"
						[mode]="mode === EAdminCommentMode.DARK ? ETextButtonMode.DARK : ETextButtonMode.LIGHT"
					></admin-text-button>
				}
				<span>{{subtitle}}</span>
			</div>
			<div class="admin-comment__texts--content">
				<ng-content></ng-content>
			</div>
		</div>
	</div>
</div>
