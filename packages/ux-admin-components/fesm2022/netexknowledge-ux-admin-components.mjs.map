<div class="admin-slide-text-toggle {{mode}}">
    @for (option of options; track option.id) {
        <button mat-button 
            class="admin-slide-text-toggle--button"
            [ngClass]="{'active': option.active}" 
            id="{{option.id}}"
            [disabled]="option.disabled"
            (click)="optionSlideTextToggleClicked(option)"
            type="button">
            <h4>{{option.text}}</h4>
        </button>
    }
</div>
