<mat-drawer-container 
	[hasBackdrop]="hasBackdrop" 
	class="{{mode}}" 
	[class.fixed-in-viewport]="fixedInViewport">
	<mat-drawer #drawer
							[opened]="opened"
							[position]="position"
							[autoFocus]="autoFocus"
							[mode]="openingMode"
							[class.fixed-in-viewport]="fixedInViewport"
							[style.width]="width"
							[style.right]="fixedInViewport && position === 'end' ? '0' : null"
							[style.left]="fixedInViewport && position === 'start' ? '0' : null"
							[style.position]="fixedInViewport ? 'fixed' : null"
							[style.zIndex]="fixedInViewport ? '1001' : null"
							(keydown.escape)="keyDownEscape.emit()"
							(closedStart)="closedStart.emit()"
							(openedChange)="openedChange.emit($event)"
							(openedStart)="openedStart.emit()">
		<ng-content select="[panel-content]"></ng-content>
	</mat-drawer>
	<mat-drawer-content [class.fixed-in-viewport]="fixedInViewport">
		<ng-content select="[main-content]"></ng-content>
	</mat-drawer-content>
</mat-drawer-container>
