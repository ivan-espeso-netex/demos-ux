<div class="admin-experts-chat-container {{mode}}" [id]="id">
	<div class="admin-experts-chat-container--header">
		<p>{{title}}</p>
	</div>
	<div class="admin-experts-chat-container--body">
		<div class="admin-experts-chat-container--body-content">
			<ng-content></ng-content>
		</div>
	</div>
	<div class="admin-experts-chat-container--footer">
		<admin-message-input 
			[mode]="mode === EExpertsChatContainerMode.DARK ? EMessageInputMode.DARK : EMessageInputMode.LIGHT"
			[id]="messageInputId"
			[placeholder]="messageInputPlaceholder"
			[iconLeftButton]="messageInputIconLeftButton"
			[idLeftButton]="messageInputIdLeftButton"
			[tooltipLeftButton]="messageInputTooltipLeftButton"
			[iconRightButton]="messageInputIconRightButton"
			[idRightButton]="messageInputIdRightButton"
			[tooltipRightButton]="messageInputTooltipRightButton"
			(leftIconButtonClicked)="messageInputLeftIconButtonClicked.emit()"
			(rightIconButtonClicked)="messageInputRightIconButtonClicked.emit()">
		</admin-message-input>
	</div>
</div>
