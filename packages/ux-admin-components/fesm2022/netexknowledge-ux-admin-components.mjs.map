<mat-sidenav-container class="admin-sidenav-container {{mode}}"
											 [hasBackdrop]="hasBackdrop"
											 (dragover)="$event.preventDefault()"
											 (drop)="$event.preventDefault()"
											 (backdropClick)="close()">
	<mat-sidenav class="admin-sidenav-container__sidenav"
							 #adminSidenav
							 [mode]="openingMode"
							 [disableClose]="disableClose"
							 [attr.role]="'dialog'"
							 [opened]="opened"
							 [position]="position"
							 [autoFocus]="autoFocus"
							 [fixedInViewport]="fixedInViewport"
							 [fixedTopGap]="fixedTopGap"
							 [fixedBottomGap]="fixedBottomGap"
							 (keydown.escape)="close()"
							 (closedStart)="closedStart.emit()"
							 (openedChange)="openedChange.emit($event)"
							 (openedStart)="openedStart.emit()"
							 [style.width]="width">

		<aside class="admin-sidenav-container__aside">
			<div class="admin-sidenav-container__aside-portal-outlet"
					 id="admin-sidenav-portal-outlet"
					 cdkPortalOutlet></div>
		</aside>

	</mat-sidenav>
	<mat-sidenav-content class="admin-sidenav-container__content">

		<ng-content></ng-content>

	</mat-sidenav-content>
</mat-sidenav-container>
