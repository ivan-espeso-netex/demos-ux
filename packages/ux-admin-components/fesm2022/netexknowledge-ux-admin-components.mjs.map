<div class="admin-tabs-container__wrapper">	
	<nav mat-tab-nav-bar
		class="admin-tabs {{mode}}"
		color="accent"
		[selectedIndex]="selectedIndex"
		[tabPanel]="tabPanel">
		@for (link of links; track link.id; let i = $index) {
			<a mat-tab-link
					(click)="linkClicked.emit({link, selectedIndex: i})"
					[active]="link.active"
					[id]="link.id"
					[disabled]="link.disabled">
					{{link.text}}
			</a>
		}
	</nav>
	@if (hasAction) {
	<admin-button
		[text]="textButton"
		[type]="typeButton"
		[tooltip]="tooltipButton"
		[disabled]="disabledButton"
		[leftIcon]="leftIconButton"	
		(click)="actionButtonClicked.emit()"
		[mode]="buttonMode()"
		[color]="EButtonColor.ACCENT"
		></admin-button>
	}
</div>
<mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
