@switch (type) {
	@case (EFloatingChatType.SUGGESTIONS) {
		<div class="admin-floating-chat suggestions {{mode}} {{size}}"
			[id]="id">
			<div class="admin-floating-chat__header">
				<ng-content select="[header]"></ng-content>
			</div>
			<div class="admin-floating-chat__body">
				<ng-content select="[bodySuggestions]"></ng-content>
			</div>
		</div>
	}
	@default {
		<div class="admin-floating-chat {{mode}} {{size}}"
			[id]="id">
			<div class="admin-floating-chat__header">
				<div class="admin-floating-chat__header-content">
					<div class="admin-floating-chat__header-left">
						<div class="admin-floating-chat__header-left-avatar">
							@if (!headerImgUrl) {
								<admin-image 
									[imgEntityType]="ImgEntityType.PLACEHOLDER_AI_PROFILE_PHOTO_32"
									[mode]="mode === EFloatingChatMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
								</admin-image>
							}
							@if (headerImgUrl && !imgError) {
								<img src="{{headerImgUrl}}" alt="{{headerImgAlt}}" (error)="handleImageError()">
							}
							@if (imgError) {
								<div class="admin-floating-chat__header-left-avatar-error">
									<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
								</div>
							}
						</div>
						<h4>{{title}}</h4>
					</div>
					<div class="admin-floating-chat__header-right">
						@if (iconLeft) {
						<admin-button
							[mode]="mode === EFloatingChatMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
							[buttonType]="EButtonButtonType.MATICONBUTTON"
							[leftIcon]="iconLeft"
							[color]="iconColorLeft"
							tooltip="{{iconTooltipLeft}}"
							(buttonClicked)="iconButtonClickedLeft.emit()"
						></admin-button>
						}
						@if (iconRight) {
						<admin-button
							[mode]="mode === EFloatingChatMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
							[buttonType]="EButtonButtonType.MATICONBUTTON"
							[leftIcon]="iconRight"
							[color]="iconColorRight"
							tooltip="{{iconTooltipRight}}"
							(buttonClicked)="iconButtonClickedRight.emit()"
						></admin-button>
						}
					</div>
				</div>
			</div>
			<div class="admin-floating-chat__body">
				<ng-content select="[body]"></ng-content>
			</div>
			<div class="admin-floating-chat__footer">
				<ng-content select="[footer]"></ng-content>
			</div>
		</div>
	}
}
