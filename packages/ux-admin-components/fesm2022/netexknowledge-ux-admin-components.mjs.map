<a
  mat-button
  class="admin-sidenav-button {{mode}} {{size}}"
  [id]="id"
  color="primary"
  [disabled]="disabled"
  [routerLink]="disabled ? null : routerLink"
  [routerLinkActive]="disabled ? '' : 'selected'">
  <div class="mat-stroked-button__wrapper">
    @if (icon) {
      <div class="mat-stroked-button__wrapper--icon">
        <admin-icon 
          [icon]="icon"
					matTooltip="{{tooltip}}">
        </admin-icon>
      </div>
    }
    <span class="buttonLabel" matTooltip="{{tooltip}}">{{text}}</span>
  </div>
</a>
