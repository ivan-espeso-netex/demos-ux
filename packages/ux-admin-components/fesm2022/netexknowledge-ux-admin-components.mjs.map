<button 
	class="admin-text-button {{mode}} {{size}}"
	[id]="id" 
	[type]="type"
	[disabled]="disabled"
	(click)="handleClick()"
	matTooltip="{{tooltip}}">
	<div class="mat-stroked-button__wrapper">
		@if (icon && size !== 'small') {
			<admin-icon 
				[icon]="icon">
			</admin-icon>
		}
		<span class="buttonLabel">{{text}}</span>
	</div>
</button>
