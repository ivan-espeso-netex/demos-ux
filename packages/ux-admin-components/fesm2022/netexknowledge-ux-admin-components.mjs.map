<div class="admin-sidenav-no-open-button {{mode}}"
	[class.collapsed]="!opened"
	[id]="id">
	<div class="admin-sidenav-no-open-button--upper">
		<ng-content select="[upper]"></ng-content>
	</div>
	<admin-divider
		[mode]="mode === ESidenavNoOpenButtonMode.DARK ? EDividerMode.DARK : EDividerMode.LIGHT">
	</admin-divider>
	<div class="admin-sidenav-no-open-button--lower">
		<ng-content select="[lower]"></ng-content>
	</div>
</div>
