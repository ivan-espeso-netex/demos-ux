<div class="admin-info-preview">

	@if (roundImage && !image) {
		<div class="admin-info-preview--round-image">
			<img mat-card-image src="{{roundImage}}" alt="">
		</div>
	} @else {
		<div [class]="imageContainerClass">
			@if (image) {
				<img mat-card-image src="{{image}}" alt="">
			} @else if (type === EEntityTypes.AUDIO) {
				<ng-content select="[audio]"></ng-content>
			} @else if (type === EEntityTypes.VIDEO) {
				<ng-content select="[video]"></ng-content>
			} @else if (icon) {
				<admin-icon [color]="EIconColor.WHITE" [icon]="icon"></admin-icon>
			}
		</div>
	}
</div>
