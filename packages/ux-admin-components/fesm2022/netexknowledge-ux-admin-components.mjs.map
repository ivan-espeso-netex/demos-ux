<mat-form-field class="admin-select {{mode}}" [class.hide-assistive-text]="hideAssistiveText" adjustPanelHeight>
  <mat-label>{{ label }}</mat-label>
  <mat-select
    [formControl]="formControl"
    hideSingleSelectionIndicator
    [panelClass]="panelClass()"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [multiple]="multiple"
    (selectionChange)="onSelectionChange($event)"
    (opened)="onOpened()"
    (closed)="onClosed()"
    (blur)="onBlur()">
    @for(option of options; track option.value; let i = $index) {
      <mat-option [value]="option.value" [disabled]="option.disabled">
        <span
          #optionElement
          [matTooltip]="option.viewValue"
          [matTooltipDisabled]="isTooltipDisabled(i)"
          class="admin-select-option-text">
          {{ option.viewValue }}
        </span>
      </mat-option>
    }
  </mat-select>
  <mat-hint>{{ hint }}</mat-hint>
  @if(hasError()) {
    <mat-error>
      {{ getErrorMessage() }}
    </mat-error>
  }
</mat-form-field>
