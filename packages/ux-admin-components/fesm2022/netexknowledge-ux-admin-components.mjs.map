@if (!skeleton) {
	<mat-card
		class="admin-course-card {{mode}} {{size}}"
		[id]="id"
		(click)="handleClick($event)">
		<div class="admin-course-card--img">
			@if (!image) {
				<admin-image 
					[imgEntityType]="ImgEntityType.PLACEHOLDER_COURSE">
				</admin-image>
			}
			@if (image && !imgError) {
				<img mat-card-sm-image src="{{image}}" alt="{{alt}}" (error)="handleImageError()">
			}
			@if (imgError) { 
				<div class="admin-panel-card__img-error">
					<span class="material-icons-outlined">broken_image</span>
				</div>
			}
		</div>
		<div class="admin-course-card--content">
			<div class="admin-course-card--content-top">
				<div class="admin-course-card--content-top-label">
					@if (label) {
						<admin-label 
							[color]="labelColor"
							[mode]="labelMode"
							text="{{label}}"
						></admin-label>
					}
				</div>
				@if (icon) {
					<div class="admin-course-card--content-top-icon">
						<admin-icon
							[icon]="icon"
						></admin-icon>
					</div>
				}
			</div>
			<div class="admin-course-card--content-bottom">
				<div class="admin-course-card--content-bottom-texts">
					@if (subtitle) {
						<p>{{subtitle}}</p>
					}
					<h2>{{title}}</h2>
				</div>
				@if (progressBarValue) {
				<admin-progress-bar 
					[value]="progressBarValue" 
					[color]="progressBarColor"
					[mode]="mode === EAdminCourseCardMode.DARK ? EProgressBarMode.DARK : EProgressBarMode.LIGHT">
				</admin-progress-bar>
				}
			</div>
		</div>
	</mat-card>
} @else if (skeleton) {
	@for (item of [].constructor(skeletonItems); track item) {
		<mat-card class="admin-course-card skeleton {{mode}} {{size}}">
			<div class="admin-course-card--img"></div>
			<div class="admin-course-card--content">
				<div class="admin-course-card--content-top"></div>
				<div class="admin-course-card--content-bottom">
					<div class="admin-course-card--content-bottom-texts">
						<span></span>
						<span></span>
					</div>
				</div>
			</div>
		</mat-card>
	}
}
