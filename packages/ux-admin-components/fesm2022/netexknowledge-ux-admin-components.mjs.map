<div 
	[id]="id"
	class="admin-drag-and-drop {{mode}}"
	[class.drag-over]="isDragOver"
	(drop)="onDrop($event)"
	(dragover)="onDragOver($event)"
	(dragleave)="onDragLeave($event)">
	<admin-button
		[buttonType]="buttonButtonType"
		[color]="buttonColor" 
		[type]="buttonType"
		[leftIcon]="icon"
		(click)="buttonClicked.emit()"
		[text]="buttonText"
		[tooltip]="buttonTooltip"
		[mode]="mode === EDragAndDropMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
	</admin-button>
	<div class="drag-and-drop__texts">
		<p>{{title}}</p>
		<label>{{subtitle}}</label>
	</div>
</div>
