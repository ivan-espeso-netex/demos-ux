<button
	mat-button
	class="admin-image-menu-button {{mode}}"
	[ngClass]="{'selected': selected}"
	[id]="id"
	[type]="type"
	color="primary"
	[disabled]="disabled"
	(click)="handleClick()"
	matTooltip="{{tooltip}}">
	<div class="admin-image-menu-button__selected"></div>
	<div class="admin-image-menu-button__content">
		<div class="admin-image-menu-button__image">
			@if (!image) {
				<admin-image [imgEntityType]="ImgEntityType.PLACEHOLDER_AI_PROFILE_PHOTO_64"></admin-image>
			}
			@if (image && !imgError) {
				<img src="{{image}}" alt="{{imageAlt}}" (error)="handleImageError()">
			}
			@if (imgError) {
				<div class="admin-image-menu-button__image-error">
					<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
				</div>
			}
		</div>
		<span class="buttonLabel">{{text}}</span>
	</div>
</button>
