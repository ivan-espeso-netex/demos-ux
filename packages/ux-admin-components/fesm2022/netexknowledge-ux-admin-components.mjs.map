<mat-form-field class="admin-input {{mode}}" [class.hide-assistive-text]="hideAssistiveText">
  <mat-label class="mat-body">{{ label }}</mat-label>
  @if(prefixIcon) {
		<admin-icon 
			matPrefix 
			[icon]="prefixIcon">
		</admin-icon>
  }
  <input 
    matInput 
    #input="matInput"
    [disabled]="disabled"
    [errorStateMatcher]="errorStateMatcher"
    [formControl]="control"
    [minlength]="minlength"
    [name]="name"
    [(ngModel)]="value"
    [placeholder]="placeholder"
    [readonly]="readonly"
    [required]="required"
    [type]="type"
    (input)="change.emit(control)"
    (focus)="focus.emit(control)" 
    (blur)="onBlur()"/>
    @if(suffixIcon && !suffixText) {
			<admin-icon 
				matSuffix 
				[icon]="suffixIcon">
			</admin-icon>
    }
		@if(suffixText && !suffixIcon) {
			<span class="admin-input__suffix-text" matSuffix>.{{suffixText}}</span>
    }
    <mat-hint>{{ hint }}</mat-hint>
    <mat-error class="mat-caption">
        @for (error of errorMessages | keyvalue; track error) {
          @if (control?.errors?.[error.key]) { 
            <span>{{ error.value }}</span><br/>
          }
        }
    </mat-error>
</mat-form-field>
