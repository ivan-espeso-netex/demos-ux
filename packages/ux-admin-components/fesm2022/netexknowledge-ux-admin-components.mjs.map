<a
  mat-button
  class="admin-aux-sidenav-button {{mode}}"
  [id]="id"
  [color]="color" 
  [disabled]="disabled"
  [ngClass]="{'active': active}"
  [routerLink]="disabled ? '' : routerLink"
  routerLinkActive="selected">
  <div class="mat-stroked-button__wrapper">
    @if (icon) {
      <div class="mat-stroked-button__wrapper--icon">
        <admin-icon 
          [icon]="icon">
        </admin-icon>
      </div>
    }
    <span class="buttonLabel" matTooltip="{{tooltip}}">{{ text }}</span>
  </div>
</a>
