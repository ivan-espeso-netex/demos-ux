<div class="admin-popup__container {{mode}}">
	<div class="admin-popup__title">
		<h4>{{ popup.title }}</h4>
		<admin-button 
			[buttonType]="EButtonButtonType.MATICONBUTTON"
			[color]="EButtonColor.PRIMARY"
			[type]="EButtonType.BUTTON"
			[leftIcon]="EIconName.CLOSE"
			(click)="close()"
			[mode]="mode === EPopupMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
		</admin-button>
	</div>
	<div class="admin-popup__content">
		<p>{{ popup.description }}</p>
	</div>
</div>
<div class="admin-popup__actions {{mode}}">
	<admin-button 
		[text]="!!popup.closeButtonText ? popup.closeButtonText : 'Cancel'"
		[color]="EButtonColor.PRIMARY"
		[type]="EButtonType.BUTTON"
		[buttonType]="EButtonButtonType.MATFLATBUTTON"
		(buttonClicked)="close()"
		[mode]="mode === EPopupMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
	</admin-button>
	<admin-button 
		[text]="!!popup.actionButtonText ? popup.actionButtonText : 'Action'"
		[color]="EButtonColor.ACCENT"
		[type]="EButtonType.BUTTON"
		[buttonType]="EButtonButtonType.MATFLATBUTTON"
		(buttonClicked)="actionButtonClicked()"
		[mode]="mode === EPopupMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
	</admin-button>
</div>
