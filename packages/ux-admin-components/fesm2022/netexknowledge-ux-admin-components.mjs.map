<div class="admin-circular-progress-bar {{mode}}">
	<svg class="circle-chart" viewBox="0 0 33.83098862 33.83098862" width="112px" height="112px" xmlns="http://www.w3.org/2000/svg">
		<circle class="circle-chart__background" stroke="#D4D4D4" stroke-width="1.5" fill="none" cx="16.91549431" cy="16.91549431" r="15.91549431" />
		<circle class="circle-chart__circle {{color}}"
			stroke-width="1.5"
			[attr.stroke-dasharray]="(value ?? 0) + ',100'"
			[attr.stroke-linecap]="'round'"
			fill="none"
			cx="16.91549431" cy="16.91549431" r="15.91549431" />
	</svg>
	<p class="circle-chart__percent">{{value}}%</p>
</div>
