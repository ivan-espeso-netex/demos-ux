<div class="admin-menu {{mode}}">
  <admin-button
    [leftIcon]="leftIcon"
    [rightIcon]="rightIcon"
    [matMenuTriggerFor]="menu"
    #menuTrigger="matMenuTrigger"
    (click)="openMenu(menuTrigger)"
    [buttonType]="buttonType"
    [color]="color"
		[size]="size"
    [disabled]="disabled"
    text="{{text}}"
    [type]="type"
		[mode]="mode === EAdminMenuMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
  ></admin-button>
  <mat-menu #menu="matMenu" [id]="id" class="admin-menu-panel {{mode}}">
    @for (option of options; track option.id) {
      @if (option.intro) {
        <span class="caption">{{option.intro}}</span>
      }
      <button
        *ngIf="option.visible !== false"
        (click)="handleClick(option)"
        [disabled]="option.disabled"
        [id]="option.id"
        mat-menu-item
        [class.divider]="option.divider">
        <p class="admin-menu-panel__btn--text">
					@if (option.icon) {
            <admin-icon
              [icon]="option.icon"
							[mode]="mode === EAdminMenuMode.DARK ? EIconMode.DARK : EIconMode.LIGHT"
              >
            </admin-icon>
          }
          <span [matTooltip]=" option.text ?? '' " [matTooltipShowDelay]="500" [matTooltipHideDelay]="0">{{ option.text }}</span>
          @if (option.actionIcon) {
            <div class="action-icon-container" (click)="handleActionIconClick(option, $event)">
              <admin-icon
                [icon]="option.actionIcon"
                [mode]="mode === EAdminMenuMode.DARK ? EIconMode.DARK : EIconMode.LIGHT"
                [matTooltip]="option.actionIconTooltip ?? '' "
              />
            </div>
          }
        </p>
        @if (option.hasCheckIcon) {
          <admin-icon
            class="admin-menu-panel__btn--check"
            [icon]="EIconName.CHECK"
          />
        }
      </button>
    }
  </mat-menu>
</div>
