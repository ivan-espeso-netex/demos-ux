<button mat-icon-button
	class="admin-profile-menu-button {{mode}}"
	[id]="menuButtonId"
	type="button"
	[disabled]="menuButtonDisabled"
	(click)="handleClick()"
	matTooltip="{{menuButtonTooltip}}"
	[matMenuTriggerFor]="profileMenu">
	<div class="admin-profile-menu-button__image">
		@if (!headerImgUrl) {
			<admin-image 
				[imgEntityType]="ImgEntityType.PLACEHOLDER_PROFILE_IMAGE_40"
				[mode]="mode === EAdminProfileMenuMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
			</admin-image>
		}
		@if (headerImgUrl && !imgError) {
			<img src="{{headerImgUrl}}" alt="{{headerImgAlt}}" (error)="handleImageError()">
		}
		@if (imgError) {
			<div class="admin-profile-menu-button__image-error">
				<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
			</div>
		}
	</div>
</button>

<mat-menu 
	#profileMenu="matMenu"
	[id]="id"
	class="admin-profile-menu-panel {{mode}}">
	<div class="admin-profile-menu-panel__header">
		<div class="admin-profile-menu-panel__user-info">
			<div class="admin-profile-menu-panel__user-info--logo">
				@if (!headerImgUrl) {
					<admin-image 
						[imgEntityType]="ImgEntityType.PLACEHOLDER_PROFILE_IMAGE_40"
						[mode]="mode === EAdminProfileMenuMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
					</admin-image>
				}
				@if (headerImgUrl && !imgError) {
					<img src="{{headerImgUrl}}" alt="{{headerImgAlt}}" (error)="handleImageError()">
				}
				@if (imgError) {
					<span class="material-icons-outlined">broken_image</span>
				}
			</div>
			<div class="admin-profile-menu-panel__user-info--texts">
				<h4>{{headerTitle}}</h4>
				<div class="label">{{headerSubtitle}}</div>
			</div>
		</div>		
        @if (showHeaderButton) {
					<admin-button 
						[buttonType]="buttonHeaderButtonTypeDefault"
						[color]="buttonHeaderColorDefault" 
						[type]="buttonHeaderTypeDefault"
						text="{{headerButtonText}}"
						tooltip="{{headerButtonText}}"
						(buttonClicked)="headerButtonClicked.emit()"
						[mode]="mode === EAdminProfileMenuMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
					></admin-button>
        }
	</div>
	<admin-divider [mode]="mode === EAdminProfileMenuMode.DARK ? EDividerMode.DARK : EDividerMode.LIGHT"></admin-divider>
	@for (option of options; track option) {
		@if (option.hasIntro) {
			<span class="caption">{{option.intro}}</span>
		}
		<button 
			mat-menu-item
			[id]="option.idOption"
			[disabled]="option.disabledOption"
			(click)="handleMenuOptionClick(option)"
			[type]="option.type">
			@if (option.icon) {
				<admin-icon 
					[icon]="option.icon || 'default-icon-name'"
					[mode]="mode === EAdminProfileMenuMode.DARK ? EIconMode.DARK : EIconMode.LIGHT">
				</admin-icon>
			}
			<span>{{option.text}}</span>
		</button>
	}
</mat-menu>
