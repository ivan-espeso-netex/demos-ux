@switch(type) {
  @case('simple') {
    <mat-form-field class="admin-datepicker {{mode}}" [class.hide-assistive-text]="hideAssistiveText">
      <mat-label>{{label}}</mat-label>
      <input 
          [id]="id"
          [name]="id"
          matInput 
          [matDatepicker]="picker"
          [placeholder]="placeholder"
          [value]="value"
          #adminDatePickerControl="matInput"
          [disabled]="disabled"
          (dateChange)="onDateChange($event.value)"
          (dateInput)="onDateInput($event.value)">
      <mat-hint>{{hint}}</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker panelClass="admin-datepicker-panel {{mode}}"></mat-datepicker>
      <mat-error>{{errorMsg}}</mat-error>
    </mat-form-field>
  }
  @case ('range') {
    <mat-form-field class="admin-datepicker {{mode}}" [class.hide-assistive-text]="hideAssistiveText">
      <mat-label>{{label}}</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input 
          matStartDate 
          [id]="id + '-start'"
          [name]="id + '-start'"
          [placeholder]="placeholderStartDate" 
          [value]="getRangeStart()"
          [disabled]="disabled"
          (dateChange)="onStartDateChange($event.value)"
          (dateInput)="onStartDateInput($event.value)">
        <input 
          matEndDate 
          [id]="id + '-end'"
          [name]="id + '-end'"
          [placeholder]="placeholderEndDate" 
          [value]="getRangeEnd()"
          [disabled]="disabled"
          (dateChange)="onEndDateChange($event.value)"
          (dateInput)="onEndDateInput($event.value)">
      </mat-date-range-input>
      <mat-hint>{{hint}}</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker panelClass="admin-datepicker-panel {{mode}}"></mat-date-range-picker>
      <mat-error>{{errorMsg}}</mat-error>
    </mat-form-field>
  }
}
