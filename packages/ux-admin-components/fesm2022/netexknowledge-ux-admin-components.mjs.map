<div class="admin-snackbarContent {{mode}}">
	<p matSnackBarLabel>{{text}}</p>
	@if (hasActions) {
		<div class="admin-snackbarContent--actions" matSnackBarActions>
			<admin-button 
				matSnackBarAction
				[buttonType]="buttonButtonType"
				[color]="buttonColor"
				text="{{buttontext}}"
				[type]="buttonType"
				[leftIcon]="leftIcon"
				[rightIcon]="rightIcon"
				(buttonClicked)="snackbarContentButtonClicked.emit()"
				[mode]="mode === ESnackbarMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
			></admin-button>
		</div>
	}
</div>
