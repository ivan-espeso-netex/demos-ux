@if (!skeleton) {
	<mat-card
		class="admin-canvas-card {{mode}} {{type}}"
		[id]="id">
		<mat-card-header>
			<mat-card-title>{{title}}</mat-card-title>
			<admin-button
				[buttonType]="buttonButtonTypeDefault"
				[color]="buttonColorDefault" 
				[type]="buttonTypeDefault"
				[leftIcon]="EIconName.CLOSE"
				(click)="deleteClicked.emit()"
				[text]="buttonText"
				[tooltip]="buttonTooltip"
				[mode]="mode === ECanvasCardMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT">
			</admin-button>
		</mat-card-header>
		<mat-card-content>
			<ng-content></ng-content>
		</mat-card-content>
	</mat-card>
} @else if (skeleton) {
	@for (item of [].constructor(skeletonItems); track item) {
		<mat-card class="admin-canvas-card skeleton {{mode}} {{type}}">
			<mat-card-header>
				<mat-card-title>
					<span></span>
				</mat-card-title>
			</mat-card-header>
			<mat-card-content>
				<span></span>
				<span></span>
				<span></span>
			</mat-card-content>
		</mat-card>
	}
}
