<div class="admin-photo-browser {{mode}}"
	id="{{id}}"
	[style.--photo-browser-width.px]="width"
	[style.--photo-browser-height.px]="height">
	<div class="admin-photo-browser__image-container {{buttonPosition}}">
    <div [class]="'admin-photo-browser__image ' + shape + ' image-background-' + use">
			@if (!image) {
				<admin-icon
					[icon]="getIconByUse()">
				</admin-icon>
			}
			@if (image && !imgError) {
				<img src="{{image}}" alt="{{alt}}" (error)="handleImageError()">
			}
			@if (imgError) {
				<div class="admin-photo-browser__image-error">
					<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
				</div>
			}
		</div>
		@if (!readonly) {
			@if (options.length === 0) {
				<div class="admin-photo-browser__button">
					<admin-button
						id="{{buttonId}}"
						[type]="buttonTypeDefault"
						tooltip="{{buttonTooltip}}"
						[buttonType]="EButtonButtonType.MATFLATBUTTON"
						[color]="buttonColorDefault"
						[disabled]="buttonDisabled"
						[leftIcon]="buttonIcon"
						(buttonClicked)="buttonClicked.emit()"
					></admin-button>
				</div>
			}
			@if (options.length > 0) {
				<div class="admin-photo-browser__button">
					<admin-floating-action-button
						[buttonColor]="EButtonColor.ACCENT"
						buttonTooltipEdit="{{buttonTooltipEdit}}"
						buttonTooltipClose="{{buttonTooltipClose}}"
						(buttonClicked)="buttonClicked.emit()"
						(optionClicked)="optionClicked.emit($event)"
						[options]="options"
						[mode]="mode === EPhotoBrowserMode.DARK ? EFloatingActionButtonMode.DARK : EFloatingActionButtonMode.LIGHT"
					></admin-floating-action-button>
				</div>
			}
		}
	</div>
	<p class="admin-photo-browser__helper-text">{{helperText}}</p>
</div>
