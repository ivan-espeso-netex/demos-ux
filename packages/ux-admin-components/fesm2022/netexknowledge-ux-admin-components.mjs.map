<image-cropper
	[disabled]="disabled"
	[imageAltText]="imageAltText"
	[imageBase64]="imageBase64"
	[imageChangedEvent]="imageChangedEvent"
	[imageFile]="imageFile"	
	[imageURL]="imageURL"
	[hideResizeSquares]="true"
	[(transform)]="transform"
	[cropperStaticWidth]="cropperWidth"
	[cropperStaticHeight]="cropperHeight"
	[containWithinAspectRatio]=false
	[allowMoveImage]="true"
	[format]="outputFormat"
	[output]="outputType"
	[roundCropper]="roundCropper"
	(cropperChange)="onCropperChanged($event)"
	(imageCropped)="onImageCropped($event)"
	(imageLoaded)="onImageLoaded($event)"
	(cropperReady)="onCropperReady($event)"
	(loadImageFailed)="onLoadImageFailed()">
</image-cropper>
<admin-slider
	(valueChanged)="onZoomChange($event)"
	[value]="zoomValue()"
	[min]="minZoomValue"
	[max]="maxZoomValue"
	[step]="stepZoomValue"
	[disabled]="disabled">
</admin-slider>
