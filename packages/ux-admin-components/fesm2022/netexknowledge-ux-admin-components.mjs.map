@if (!skeleton) {
	<mat-card
		class="admin-panel-card {{mode}}"
		[id]="id"
		(click)="handleClick()">
		<mat-card-header>
			<div class="admin-panel-card__img-container">
				@if (!image) {
					<admin-image 
						[imgEntityType]="ImgEntityType.PLACEHOLDER_ACTION_NO_IMAGE"
						[mode]="mode === EPanelCardMode.DARK ? ImgMode.DARK : ImgMode.LIGHT">
					</admin-image>
				}
				@if (image && !imgError) {
					<img mat-card-sm-image src="{{image}}" alt="{{alt}}" (error)="handleImageError()">
				}
				@if (imgError) { 
					<div class="admin-panel-card__img-error">
						<admin-icon [icon]="EIconName.BROKEN_IMAGE"></admin-icon>
					</div>
				}
			</div>
			<mat-card-title-group>
				<mat-card-title>{{title}}</mat-card-title>
				<mat-card-subtitle>{{description}}</mat-card-subtitle>
			</mat-card-title-group>
		</mat-card-header>
	</mat-card>
} @else if (skeleton) {
	@for (item of [].constructor(skeletonItems); track item) {
		<mat-card
			class="admin-panel-card skeleton {{mode}}">
			<mat-card-header>
				<div class="admin-panel-card__img-container"></div>
				<mat-card-title-group>
					<mat-card-title></mat-card-title>
					<mat-card-subtitle></mat-card-subtitle>
					<mat-card-subtitle></mat-card-subtitle>
				</mat-card-title-group>
				</mat-card-header>
		</mat-card>
	}
}
