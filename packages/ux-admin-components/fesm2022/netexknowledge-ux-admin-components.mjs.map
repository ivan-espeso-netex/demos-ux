<hr class="sticky-header-guard">
<div class="admin-table {{mode}}" [ngClass]="{'selectable': selectable(), 'selectable-single': singleSelection(), 'sticked': stickyHeader && isSticked, 'fixed-width': tableWidth !== '100%'}" [style.max-width]="tableWidth">

	<div
		*ngIf="selectable() && !singleSelection()"
		class="admin-table__selection-header"
		[ngClass]="{'active': countSelectedRows, 'selectable': selectable(), 'sticky': stickyHeader}">
		<h4>{{ countSelectedRows }} {{ selectionHeaderMessage }}</h4>
		<div class="selection-header__actions-wrapper">
			<ng-content select="[selection-header-actions]"></ng-content>
		</div>
	</div>

	<div class="admin-table__table-wrapper">

		<div class="button-wrapper" *ngIf="visibleColumnDefinition.length > 0">
			<admin-button
				[type]="dropdownButtonType"
				[tooltip]="dropdownButtonTooltip"
				[buttonType]="dropdownButtonButtonType"
				[color]="dropdownButtonColor"
				[disabled]="false"
				[leftIcon]="EIconName.SETTINGS"
				[matMenuTriggerFor]="menu"
				[mode]="mode === EAdminTableMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
			></admin-button>
			<mat-menu #menu="matMenu" class="visible-columns-menu {{mode}}">
				<mat-checkbox
					*ngFor="let column of visibleColumnDefinition"
					[checked]="column.visible"
					(click)="$event.stopPropagation()"
					(change)="onMenuItemChange(column, $event.checked)">
					{{ column.displayName }}
				</mat-checkbox>
			</mat-menu>
		</div>

		<table #table mat-table [dataSource]="dataSource" matSort [matSortDisableClear]="!enableSortClear" [style.width]="tableWidth">

			<ng-container *ngFor="let column of columns()" matColumnDef="{{ column.name }}" [sticky]="column.sticky" [stickyEnd]="column.stickyEnd">

					<ng-container [ngSwitch]="column.name">
						<ng-container *ngSwitchCase="'select'">
							<ng-container *ngIf="singleSelection(); else checkboxTemplate">
								<ng-container *ngTemplateOutlet="radio"></ng-container>
							</ng-container>
							<ng-template #checkboxTemplate>
								<ng-container *ngTemplateOutlet="checkbox"></ng-container>
							</ng-template>
						</ng-container>
						<ng-container *ngSwitchDefault>
							<ng-container *ngTemplateOutlet="nocheckbox"></ng-container>
						</ng-container>
					</ng-container>

					<ng-template #checkbox>
						<th mat-header-cell *matHeaderCellDef>
							<mat-checkbox
								(change)="$event ? masterToggle() : null"
								[checked]="selection?.hasValue() && isAllSelected()"
								[indeterminate]="selection?.hasValue() && !isAllSelected()">
							</mat-checkbox>
						</th>
						<td mat-cell *matCellDef="let row">
							<mat-checkbox
								(click)="$event.stopPropagation()"
								(change)="toggleRow(row, $event.checked)"
								[checked]="selection?.isSelected(row)"
								[disabled]="row.disabled">
							</mat-checkbox>
						</td>
						<td mat-footer-cell *matFooterCellDef class="skeleton"><div></div></td>
					</ng-template>

					<ng-template #nocheckbox>
						<th
							mat-header-cell
							*matHeaderCellDef
							[style.flex]="column.width ? '0 0 ' + column.width : (column.flexGrow ? column.flexGrow + ' 0 0' : '1 0 0')"
							[style.min-width]="column.minWidth || null">
							<div class="column-header-content">
								@if (column.sortable !== false) {
									<div [mat-sort-header]="column.name">
										<span class="label"
											#headerLabel
											[attr.data-header-key]="column.name"
											[matTooltip]="column.displayName"
											[matTooltipDisabled]="checkHeaderTooltipDisabled(column.name)">{{ column.displayName }}</span>
									</div>
								} @else {
									<span class="label"
										#headerLabel
										[attr.data-header-key]="column.name"
										[matTooltip]="column.displayName"
										[matTooltipDisabled]="checkHeaderTooltipDisabled(column.name)">{{ column.displayName }}</span>
								}
							</div>
						</th>
						<td
							mat-cell
							*matCellDef="let element"
							[ngSwitch]="column.columnType"
							[style.flex]="column.width ? '0 0 ' + column.width : (column.flexGrow ? column.flexGrow + ' 0 0' : '1 0 0')"
							[style.min-width]="column.minWidth || null">
							<ng-template [ngSwitchCase]="'component'">
								<div class="wrapper">
									<ng-container
										*ngComponentOutlet="
											column.component?.selector!;
											inputs: column.component?.inputs(element)
										">
									</ng-container>
								</div>
							</ng-template>
							<ng-template [ngSwitchDefault]>
								<span class="label"
									#label
									[attr.data-key]="element[column.name]"
									[matTooltip]="element[column.name]"
									[matTooltipDisabled]="checkTooltipDisabled(element[column.name])">
									{{ element[column.name] }}
								</span>
							</ng-template>
						</td>
						<td
							mat-footer-cell
							*matFooterCellDef
							class="skeleton"
							[style.flex]="column.width ? '0 0 ' + column.width : (column.flexGrow ? column.flexGrow + ' 0 0' : '1 0 0')"
							[style.min-width]="column.minWidth || null">
							<div></div>
						</td>
					</ng-template>

					<ng-template #radio>
						<th mat-header-cell *matHeaderCellDef></th>
						<td mat-cell *matCellDef="let row">
							<mat-radio-button
								[value]="row"
								(change)="toggleRow(row, $event.source.checked)"
								[checked]="selection?.isSelected(row)"
								[disabled]="row.disabled">
							</mat-radio-button>
						</td>
						<td mat-footer-cell *matFooterCellDef class="skeleton"><div></div></td>
					</ng-template>

			</ng-container>

			<tr mat-header-row *matHeaderRowDef="columnNames(); sticky: stickyHeader" [ngClass]="{'sticky-and-selectable': stickyHeader && selectable()}"></tr>

			<tr mat-row *matRowDef="let row; columns: columnNames()" [ngClass]="{'disabled-row': row.disabled}"></tr>

		  <ng-container *matNoDataRow>
			@if(status() === 'loading-data') {
				<tr class="mat-row skeleton-row">
					<td
						class="mat-cell skeleton"
						*ngFor="let column of columns()"
						[style.flex]="column.name === 'select' ? '0 0 40px' : (column.width ? '0 0 ' + column.width : (column.flexGrow ? column.flexGrow + ' 0 0' : '1 0 0'))"
						[style.min-width]="column.minWidth || null">
						<div></div>
					</td>
				</tr>
			}
				@if(status() === 'loaded-data') {
					<td class ="mat-mdc-cell no-data-placeholder-cell" [attr.colspan]="columns().length">
						<div class="no-data-placeholder-cell-wrapper">
							<ng-content select="admin-no-content-placeholders"></ng-content>
						</div>
					</td>
				}
			</ng-container>

			<tr mat-footer-row *matFooterRowDef="columnNames()" [class.hidden]="status() !== 'adding-data'"></tr>
		</table>

	</div>

</div>
