<div class="admin-searchbox {{mode}}">
  <admin-icon tabindex="-1" (click)="updateValue(input.value)" [icon]="EIconName.SEARCH"></admin-icon>
  <label class="sr-only" [for]="id()">{{ label() }}</label>
  <input
    #input
    (blur)="onTouched()"
    (change)="updateValue(input.value)"
    (keyup.enter)="updateValue(input.value)"
    (keyup.escape)="updateValue('')"
    [id]="id()"
    [placeholder]="placeholder()"
    [value]="value()"
    type="text"
    [disabled]="disabled"
  />
  @if (value()) {
    <admin-icon tabindex="-1" (click)="updateValue('')" [icon]="EIconName.CLOSE"></admin-icon>
  }
</div>
