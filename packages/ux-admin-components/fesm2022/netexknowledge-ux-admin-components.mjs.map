<div class="admin-floating-action-button {{mode}}" [id]="id">
	<admin-button
		[mode]="mode === EFloatingActionButtonMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
		[buttonType]="EButtonButtonType.MATFLATBUTTON"
		[leftIcon]="buttonIcon"
		[color]="buttonColor"
		[tooltip]="buttonTooltip"
		(buttonClicked)="handleButtonClick()"
	></admin-button>
	<div class="admin-floating-action-button__options" *ngIf="showOptions">
		@for (option of options; track option.optionId) {
			<admin-button
				[id]="option.optionId"
				[mode]="mode === EFloatingActionButtonMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
				[buttonType]="EButtonButtonType.MATFLATBUTTON"
				[leftIcon]="option.optionIcon"
				[color]="option.optionColor"
				tooltip="{{option.optionTooltip}}"
				(buttonClicked)="handleClick(option)"
			></admin-button>
		}
	</div>
</div>
