@switch (buttonType) {
	@case ("mat-flat-button") {
		<button 
			mat-flat-button
			class="admin-button {{mode}} {{size}}"
			[class.has-text]="text"
			[id]="id"
			[type]="type"
			[color]="color"
			[attr.form]="form"
			[disabled]="disabled"
			(click)="handleClick()"
			matTooltip="{{tooltip}}">
			<div class="mat-stroked-button__wrapper">
				<ng-container *ngTemplateOutlet="buttonContent"></ng-container>
			</div>
		</button>
	}
	@case ("mat-stroked-button") {
		<button 
			mat-stroked-button
			class="admin-button {{mode}} {{size}}"
			[class.has-text]="text"
			[id]="id"
			[type]="type"
			[color]="color"
			[attr.form]="form"
			[disabled]="disabled"
			(click)="handleClick()"
			matTooltip="{{tooltip}}">
			<div class="mat-stroked-button__wrapper">
				<ng-container *ngTemplateOutlet="buttonContent"></ng-container>
			</div>
		</button>
	}
	@case ("mat-icon-button") {
		<button 
			[id]="id"
			class="admin-button {{mode}} {{size}}"
			mat-icon-button
			[type]="type"
			[color]="color"
			[attr.form]="form"
			[disabled]="disabled"
			[attr.aria-label]="text"
			matTooltip="{{tooltip}}"
			(click)="handleClick()">
			@if (leftIcon) {
				<admin-icon 
					[icon]="leftIcon">
				</admin-icon>
			}
		</button>
	}
	@default {
	<button mat-button
					class="admin-button {{mode}} {{size}}"
					[class.has-text-and-icon]="text"
					[id]="id"
					[type]="type"
					[color]="color"
					[attr.form]="form"
					[disabled]="disabled"
					(click)="handleClick()"
					matTooltip="{{tooltip}}">
		<div class="mat-stroked-button__wrapper">
			<ng-container *ngTemplateOutlet="buttonContent"></ng-container>
		</div>
	</button>
	}
}
<!-- Reusable partial template for button content -->
<ng-template #buttonContent>
	@if (leftIcon) {
		<ng-container *ngTemplateOutlet="iconTemplate; context: { $implicit: leftIcon }"></ng-container>
	}
	@if (text) {
		<span class="buttonLabel">{{text}}</span>
	}
	@if (rightIcon) {
		<ng-container *ngTemplateOutlet="iconTemplate; context: { $implicit: rightIcon }"></ng-container>
	}
</ng-template>

<!-- Reusable template for displaying icons -->
<ng-template #iconTemplate let-icon>
	@if (!loadingState) {
		<admin-icon 
			[icon]="icon">
		</admin-icon>
	}
	@else {
		<admin-image [imgEntityType]="getDynamicImgEntityTypeForIcon(icon)"></admin-image>
	}
</ng-template>
