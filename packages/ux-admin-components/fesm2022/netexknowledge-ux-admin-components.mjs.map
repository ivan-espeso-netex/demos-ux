<div class="admin-message-input-container {{mode}}">
	@switch (messageInputType) {
		@case (EMessageInputType.DEFAULT) {
			<mat-form-field class="admin-message-input">
				@if (iconLeftButton) {
					<admin-button
						matPrefix
					id="{{idLeftButton}}"
					[type]="EButtonType.BUTTON"
					tooltip="{{tooltipLeftButton}}"
					[buttonType]="EButtonButtonType.MATICONBUTTON"
					[mode]="mode === EMessageInputMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
					[color]="EButtonColor.PRIMARY"
					[leftIcon]="iconLeftButton"
					(buttonClicked)="leftIconButtonClicked.emit(textareaInput.value)"
					(click)="$event.stopPropagation()"
				></admin-button>
				}
				<div class="admin-message-input__content">
					@if (chips.length > 0) {
						<div class="admin-message-input__content--attached-files">
							<admin-chip-group 
								[chips]="chips" 
								[mode]="mode === EMessageInputMode.DARK ? EChipGroupMode.DARK : EChipGroupMode.LIGHT" 
								(removedChip)="this.removedChip.emit($event)"
								(clickedChip)="this.clickedChip.emit($event)">
							</admin-chip-group>
						</div>
					}
					<textarea 
						#textareaInput
						matInput
						[disabled]="disabled"
						[placeholder]="placeholder"
						(blur)="messageInputBlur.emit(textareaInput.value)"
						(focus)="messageInputFocus.emit(textareaInput.value)"
						(input)="onTextareaInput(textareaInput.value)"
						cdkTextareaAutosize 
						cdkAutosizeMinRows="2"
						cdkAutosizeMaxRows="8"
					></textarea>
				</div>
				@if (iconRightButton) {
					<admin-button
						matSuffix
					id="{{idRightButton}}"
					[type]="EButtonType.BUTTON"
					[mode]="mode === EMessageInputMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
					tooltip="{{tooltipRightButton}}"
					[buttonType]="EButtonButtonType.MATICONBUTTON"
					[color]="EButtonColor.ACCENT"
					[leftIcon]="iconRightButton"
					[disabled]="disabledRightButton"
					(buttonClicked)="rightIconButtonClicked.emit(textareaInput.value)"
					(click)="$event.stopPropagation()"
				></admin-button>
				}
			</mat-form-field>
		}
		@case (EMessageInputType.IA_THINKING) {
			<div class="admin-message-input-thinking">
				<admin-image
					[imgEntityType]="ImgEntityType.ICON_ANIMATED_WAIT">
				</admin-image>
				<admin-button
					matSuffix
					id="{{idRightButton}}"
				[type]="EButtonType.BUTTON"
				[mode]="mode === EMessageInputMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
				tooltip="{{tooltipRightButton}}"
				[buttonType]="EButtonButtonType.MATICONBUTTON"
				[color]="EButtonColor.ACCENT"
				[leftIcon]="iconRightButton"
				(buttonClicked)="rightIconButtonClicked.emit()"
				(click)="$event.stopPropagation()"
			></admin-button>
			</div>
		}
		@case (EMessageInputType.STRETCH) {
			<mat-form-field class="admin-message-input stretch">
				<textarea 
					#textareaInput
					matInput
					[disabled]="disabled"
					[placeholder]="placeholder"
					(blur)="messageInputBlur.emit(textareaInput.value)"
					(focus)="messageInputFocus.emit(textareaInput.value)"
					(input)="onTextareaInput(textareaInput.value)"
					cdkTextareaAutosize 
					cdkAutosizeMinRows="2"
					cdkAutosizeMaxRows="8"
				></textarea>
				@if (iconRightButton) {
				<admin-button
					matSuffix
					id="{{idRightButton}}"
					[type]="EButtonType.BUTTON"
					tooltip="{{tooltipRightButton}}"
					[buttonType]="EButtonButtonType.MATICONBUTTON"
					[color]="EButtonColor.ACCENT"
					[leftIcon]="iconRightButton"
					[disabled]="disabledRightButton"
					(buttonClicked)="rightIconButtonClicked.emit(textareaInput.value)"
					(click)="$event.stopPropagation()"
					[mode]="mode === EMessageInputMode.DARK ? EButtonMode.DARK : EButtonMode.LIGHT"
				></admin-button>
				}
			</mat-form-field>
		}
	}
</div>
