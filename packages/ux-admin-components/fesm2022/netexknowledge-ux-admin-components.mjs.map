<div class="admin-progress-spinner {{mode}}">
    <mat-progress-spinner
        [mode]="progressMode"
        [value]="value"
        [color]="color"
        [diameter]="diameter"
        [strokeWidth]="strokeWidth">
    </mat-progress-spinner>
    @if (text) {
        <span class="label">{{text}}</span>
    }
</div>
