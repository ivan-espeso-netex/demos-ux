<div class="admin-stepper {{mode}}">
	<div class="admin-stepper_steps">
		@for (step of steps(); track step.id) {
			<div class="step" [ngClass]="$index <= currentStepIndex() ? 'active': 'inactive'">
				<span class="bullet"></span>
				<span class="text">{{step.label}}</span>
			</div>
			@if($index < steps().length - 1) {
				<div class="line" [ngClass]="$index < currentStepIndex() ? 'active': 'inactive'"></div>
			}
		}
	</div>
</div>
