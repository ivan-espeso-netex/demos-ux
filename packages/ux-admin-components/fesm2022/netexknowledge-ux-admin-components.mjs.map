<mat-form-field class="admin-textarea {{mode}}" [class.hide-assistive-text]="hideAssistiveText">
  <mat-label> {{ label }}</mat-label>
  <textarea 
    matInput 
    [disabled]="disabled"
    [formControl]="formControl"
    [placeholder]="placeholder"
    [required]="required"
    [value]="value" 
    (input)="onInputChange($event)"
    (focus)="focus.emit(formControl)" 
    (blur)="onBlur()"></textarea>
  <mat-hint>{{ hint }}</mat-hint>
  @if(hasError()) {
    <mat-error>
      {{ getErrorMessage() }}
    </mat-error>
  }
</mat-form-field>
