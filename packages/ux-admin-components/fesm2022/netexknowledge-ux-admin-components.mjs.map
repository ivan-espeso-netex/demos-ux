<div class="admin-sidenav {{mode}}"
		 [class.collapsed]="!opened">
	<div class="admin-sidenav_upper">
		<button class="admin-sidenav_button"
						(click)="toggleSidenav.emit()">
			<admin-icon [icon]="EIconName.MENU"></admin-icon>
		</button>
		<div class="admin-sidenav_upper--content">
			<ng-content></ng-content>
		</div>
	</div>
	@if (title || progressBarText || buttonText) {
		<div class="admin-sidenav_lower">
			<admin-progress-bar-with-button 
				[icon]="icon"
				title="{{title}}"
				progressBarText="{{progressBarText}}"
				[progressBarValue]="progressBarValue"
				[progressBarColor]="progressBarColor"
				buttonText="{{buttonText}}"
				[mode]="mode === ESidenavMode.DARK ? EProgressBarWithButtonMode.DARK : EProgressBarWithButtonMode.LIGHT"
				(sidenavFooterButtonClicked)="sidenavFooterButtonClicked.emit()">
			</admin-progress-bar-with-button>
		</div>
	}
</div>
