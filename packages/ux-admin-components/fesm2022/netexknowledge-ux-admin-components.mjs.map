	<!-- BEGIN DEPRECATED -->
@switch (fontFamily) {

	@case ("material-icons-outlined") {
		<mat-icon class="admin-icon {{fontFamily}} {{mode}}"
							aria-hidden="false"
							fontIcon="{{icon}}"
							color="{{color}}"></mat-icon>
		}
	@case ("material-icons-filled") {
		<mat-icon class="admin-icon {{fontFamily}} {{mode}}"
							aria-hidden="false"
							fontIcon="{{icon}}"
							color="{{color}}"></mat-icon>
		}

	@case ("icons-custom") {
	<!-- END DEPRECATED -->

	<mat-icon
		class="admin-icon icon-{{icon}} {{mode}}"
		aria-hidden="false"
		[color]="isEnumColor ? color : undefined"
		[style.color]="isEnumColor ? null : color">
		@if (isColoredIcon) {
			<div coloredIcon>
				@for (path of coloredIconPaths; track path) {
					<span class="path{{path}}"></span>
				}
			</div>
		}
	</mat-icon>
	}
}
